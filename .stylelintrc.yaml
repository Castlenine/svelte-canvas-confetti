# https://stylelint.io/user-guide/rules/

defaultSeverity: warning

extends:
  - stylelint-config-html
  - stylelint-config-html/html
  - stylelint-config-html/xml
  - stylelint-config-html/svelte
  - stylelint-config-standard
  - stylelint-config-recommended
customSyntax: postcss-html

overrides:
  - files: ['**/*.css']
    rules:
      import-notation: string

ignoreFiles:
  # ======== Node modules ========
  - 'node_modules/'
  # ======== Output ========
  - '.svelte-kit/'
  - 'dist/'
  - 'public/'
  # ======== Backup & local files ========
  - '*.backup'
  - '*.backup.*'
  - '*.bak'
  - '*.bak.*'
  - '*.local'
  - '*.local-backup'
  - '*.local-backup.*'
  - '*.local.*'
  # ======== YAML ========
  - '*.yaml'
  - '*.yml'

plugins:
  # - stylelint-at-rule-no-children
  # - stylelint-csstree-validator
  # - stylelint-declaration-block-no-ignored-properties
  # - stylelint-declaration-strict-value
  # - stylelint-declaration-use-variable
  # - stylelint-images
  # - stylelint-no-browser-hacks
  - stylelint-no-unsupported-browser-features
  - stylelint-order

rules:
  # -- Plugin
  plugin/no-unsupported-browser-features:
    - true
    - browsers:
        - '>0.5%'
      ignore:
        - backdrop-filter
        - background-attachment
        - background-clip-text
        - background-img-opts
        - border-image
        - border-radius
        - calc
        - css-animation
        - css-appearance
        - css-boxshadow
        - css-cascade-layers
        - css-display-contents
        - css-fixed
        - css-focus-visible
        - css-gradients
        - css-initial-value
        - css-letter-spacing
        - css-masks
        - css-media-interaction
        - css-nesting
        - css-not-sel-list
        - css-overflow
        - css-overscroll-behavior
        - css-resize
        - css-rrggbbaa
        - css-scroll-behavior
        - css-scrollbar
        - css-selection
        - css-snappoints
        - css-touch-action
        - css-transitions
        - css-variables
        - css3-cursors
        - flexbox
        - intrinsic-width
        - kerning-pairs-ligatures
        - object-fit
        - outline
        - pointer-events
        - rem
        - svg-css
        - text-decoration
        - text-decoration-thickness
        - text-size-adjust
        - transforms2d
        - transforms3d
        - user-select-none
        - viewport-unit-variants
        - viewport-units
        - word-break

  # -- Possible errors

  # import
  # import-notation handled per-filetype in overrides

  # Color
  color-no-invalid-hex: true

  # Font family
  font-family-no-duplicate-names: true
  font-family-no-missing-generic-family-keyword: true

  # Function
  function-calc-no-unspaced-operator: true
  function-linear-gradient-no-nonstandard-direction: true

  # String
  string-no-newline: true

  # Unit
  unit-no-unknown: null # Covered by unit-allowed-list.

  # Property
  property-no-unknown: true
  declaration-property-value-no-unknown:
    - true
    - ignoreProperties:
        mask: ['/.+/']
        /./: ['/theme\(.+\)/']

  # Keyframe declaration
  keyframe-declaration-no-important: true

  # Declaration block
  declaration-block-no-duplicate-properties: true
  declaration-block-no-shorthand-property-overrides: true

  # Block
  block-no-empty: true

  # Selector
  selector-pseudo-class-no-unknown:
    - true
    - ignorePseudoClasses:
        - global
  selector-pseudo-element-no-unknown: true
  selector-type-no-unknown: true

  # Media feature
  media-feature-name-no-unknown: true
  media-feature-range-notation: prefix

  # At-rule
  at-rule-no-deprecated: true
  at-rule-no-unknown:
    - true
    - ignoreAtRules:
        - extends
        - for
        - forward
        - layer
        - use

  # Comment
  comment-no-empty: true

  # General / Sheet
  no-descending-specificity: null # too complicated to implement
  no-duplicate-at-import-rules: true
  no-duplicate-selectors: true
  no-empty-source: true
  no-invalid-double-slash-comments: true # CSS-only

  # -- Limit language features

  # Color
  color-named: null # via stylelint-declaration-strict-value
  color-no-hex: null # via stylelint-declaration-strict-value

  # Function
  function-url-no-scheme-relative: true

  # Number
  number-max-precision: 10

  # Keyframes
  keyframes-name-pattern: ^([a-z][a-z0-9]*)(-[a-z0-9]+)*(-animation)$

  # Time
  time-min-milliseconds: null

  # Unit
  unit-disallowed-list: null # Covered by unit-allowed-list.
  unit-allowed-list:
    - rem
    - em
    - '%'
    - px
    - vw
    - vh
    - dvw
    - dvh
    - svw
    - svh
    - lvw
    - lvh
    - vmin
    - vmax
    - fr
    - ms
    - s
    - deg
    - lh
    - ch

  # Shorthand property
  shorthand-property-no-redundant-values: true

  # Value
  value-no-vendor-prefix: true

  # Custom property
  custom-property-pattern: null
  custom-property-no-missing-var-function: true

  # Property
  property-no-vendor-prefix: true

  # Declaration
  declaration-block-no-redundant-longhand-properties: null
  declaration-no-important: null

  # Declaration block
  declaration-block-single-line-max-declarations: null # no single line

  # Selector
  selector-class-pattern:
    - '^([a-z][a-z0-9]*)(-[a-z0-9]+)*$'
    - resolveNestedSelectors: true
      message: 'Class names must be in lowercase-kebab-case'

  selector-id-pattern:
    - /\s\S/
    - message: 'Unexpected id selector'

  selector-max-attribute: null
  selector-max-class: null
  selector-max-combinators: null
  selector-max-compound-selectors: null
  selector-max-id: null
  selector-max-pseudo-class: null
  selector-max-specificity: null
  selector-max-type: null
  selector-max-universal: 0
  selector-nested-pattern: null
  selector-no-qualifying-type: null
  selector-no-vendor-prefix: true

  # Media feature
  media-feature-name-no-vendor-prefix: true

  # Custom media
  custom-media-pattern: null

  # At-rule
  at-rule-no-vendor-prefix: true
  # at-rule-property-required-list: null

  # Comment
  comment-word-disallowed-list:
    - - '/\b(fixme|bug)\b/i'
      - '/\b(todo|tocheck|hack)\b/i'
    - severity: warning
      message: 'Avoid placeholder task comments; create a tracked task instead.'

  # General / Sheet
  max-nesting-depth:
    - 4
    - ignoreAtRules:
        - screen
        - media
  no-unknown-animations: null # keyframes / animation in different files

  # -- Stylistic issues

  # Color
  color-hex-length: long

  # Font family
  font-family-name-quotes: null

  # Font weight
  font-weight-notation: null # via scale-unlimited/declaration-strict-value

  # Function
  function-name-case: null
  function-url-quotes:
    - always
    - except: empty

  # Length
  length-zero-no-unit: true

  # Value
  value-keyword-case: lower

  # Custom property
  custom-property-empty-line-before: never

  # Declaration
  declaration-empty-line-before: null

  # Selector
  selector-attribute-quotes: always
  selector-pseudo-element-colon-notation: double
  selector-type-case: lower

  # Rule
  rule-empty-line-before:
    null
    # - always
    # - except:
    #     - after-single-line-comment
    #   ignore:
    #     - first-nested
    #     - after-comment

  # At-rule
  at-rule-empty-line-before: null

  # Comment
  comment-empty-line-before:
    - always
    - except: [first-nested]
      ignore: [after-comment, stylelint-commands]

  comment-whitespace-inside: always

  # -- Plugins

  # -- Declaration strict value
  # scale-unlimited/declaration-strict-value:
  #   - - z-index
  #     - /-radius/
  #     - /color/
  #     - font-family
  #     - font-size
  #     - font-weight

  #   - ignoreKeywords:
  #       z-index:
  #         - '-1'
  #         - auto
  #         - inherit

  #       /-radius/:
  #         - inherit

  #       /color/:
  #         - transparent
  #         - currentColor
  #         - inherit

  #       font-family:
  #         - inherit

  #       font-size:
  #         - inherit

  #       font-weight:
  #         - inherit

  # -- Order
  order/order:
    # properties
    - - declarations

      # Nested
      - rules

      # Current &,
      - type: rule
        selector: ^&,

      # &::pseudo-elements
      - type: rule
        selector: ^&::[\w-]+,?

      # &:pseudo-classes
      - type: rule
        selector: ^&:[\w-]+,?

      # Parent selection &
      - type: rule
        selector: '&$'

    - unspecified: ignore

  # no-invalid-position-at-import-rule: null

  # https://www.w3.org/Style/CSS/all-properties.en.html (excluding FPWD)
  order/properties-order:
    - - groupName: 'Content'
        properties:
          - content
          - quotes

      - groupName: 'Position'
        properties:
          - position
          - top
          - right
          - bottom
          - left
          - z-index

      - groupName: 'Element'
        properties:
          - appearance
          - display
          - float
          - clear
          - overflow
          - overflow-x
          - overflow-y
          - overflow-style
          - overflow-wrap
          - overflow-scrolling # Not W3C
          - overscroll-behavior
          - clip
          - clip-path
          - clip-rule
          - visibility
          - opacity
          - vertical-align
          - resize

      - groupName: 'Gap'
        properties:
          - gap
          - row-gap

      - groupName: 'Grid'
        properties:
          - grid
          - grid-area
          - grid-auto-flow
          - grid-auto-rows
          - grid-auto-columns
          - grid-template
          - grid-template-areas
          - grid-template-rows
          - grid-template-columns
          - grid-row
          - grid-row-start
          - grid-row-end
          - grid-column
          - grid-column-start
          - grid-column-end

      - groupName: 'Flex'
        properties:
          - flex
          - flex-grow
          - flex-shrink
          - flex-basis
          - flex-flow
          - flex-direction
          - flex-wrap
          - justify-items
          - justify-content
          - justify-self
          - align-items
          - align-content
          - align-self
          - order

      - groupName: 'List'
        properties:
          - list-style
          - list-style-type
          - list-style-position
          - list-style-image
          - counter-reset
          - counter-set
          - counter-increment

      - groupName: 'Dimension'
        properties:
          - box-sizing
          - width
          - min-width
          - max-width
          - height
          - min-height
          - max-height
          - padding
          - padding-top
          - padding-right
          - padding-bottom
          - padding-left
          - border
          - border-top
          - border-right
          - border-bottom
          - border-left
          - border-width
          - border-top-width
          - border-right-width
          - border-bottom-width
          - border-left-width
          - border-style
          - border-top-style
          - border-right-style
          - border-bottom-style
          - border-left-style
          - border-color
          - border-top-color
          - border-right-color
          - border-bottom-color
          - border-left-color
          - border-radius
          - border-top-left-radius
          - border-top-right-radius
          - border-bottom-left-radius
          - border-bottom-right-radius
          - border-image
          - border-image-source
          - border-image-slice
          - border-image-width
          - border-image-outset
          - border-image-repeat
          - margin
          - margin-top
          - margin-right
          - margin-bottom
          - margin-left
          - outline
          - outline-width
          - outline-style
          - outline-color
          - outline-offset
          - box-shadow

      - groupName: 'Background'
        properties:
          - background
          - background-color
          - background-image
          - background-position
          - background-size
          - background-repeat
          - background-origin
          - background-clip
          - background-attachment
          - background-blend-mode

      - groupName: 'Text'
        properties:
          - color
          - font
          - font-family
          - font-size
          - font-size-adjust
          - font-weight
          - font-style
          - font-kerning
          - font-stretch
          - font-display
          - font-variant
          - font-variant-alternates
          - font-variant-caps
          - font-variant-east-asian
          - font-variant-ligatures
          - font-variant-numeric
          - font-variant-position
          - font-variation-settings
          - font-feature-settings
          - font-language-override
          - text-align
          - text-align-all
          - text-align-last
          - text-justify
          - text-indent
          - text-transform
          - text-decoration
          - text-decoration-line
          - text-decoration-style
          - text-decoration-color
          - text-decoration-skip
          - text-underline-position
          - text-shadow
          - text-combine-upright
          - text-orientation
          - text-overflow
          - text-emphasis
          - text-emphasis-style
          - text-emphasis-color
          - text-emphasis-position
          - line-height
          - direction
          - letter-spacing
          - tab-size
          - white-space
          - word-break
          - word-spacing
          - word-wrap
          - src

      - groupName: 'Table'
        properties:
          - caption-side
          - table-layout
          - border-collapse
          - border-spacing
          - empty-cells
          - columns
          - column-gap
          - column-fill
          - column-rule
          - column-span
          - column-count
          - column-width

      - groupName: 'Mask'
        properties:
          - mask
          - mask-border
          - mask-border-mode
          - mask-border-outset
          - mask-border-repeat
          - mask-border-slice
          - mask-border-source
          - mask-border-width
          - mask-clip
          - mask-composite
          - mask-image
          - mask-mode
          - mask-origin
          - mask-position
          - mask-repeat
          - mask-size
          - mask-type

      - groupName: 'Alteration'
        properties:
          - filter
          - transform
          - transform-origin
          - transform-box

      - groupName: 'Transition'
        properties:
          - transition
          - transition-property
          - transition-duration
          - transition-timing-function
          - transition-delay

      - groupName: 'Animation'
        properties:
          - animation
          - animation-name
          - animation-duration
          - animation-timing-function
          - animation-delay
          - animation-iteration-count
          - animation-direction
          - animation-fill-mode
          - animation-play-state

      - groupName: 'Cursor'
        properties:
          - cursor
          - user-select

    - unspecified: bottomAlphabetical

  order/properties-alphabetical-order: null
