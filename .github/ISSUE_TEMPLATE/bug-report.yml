name: Bug Report
description: Report a bug in @castlenine/svelte-canvas-confetti
title: '[Bug]: '
labels: ['bug']
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Import the component...
        2. Set props to...
        3. Trigger confetti by...
        4. Observe the error...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened.
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots or Recordings
      description: If applicable, add screenshots or screen recordings to help explain the issue.
    validations:
      required: false

  - type: input
    id: library-version
    attributes:
      label: Library Version
      description: The version of `@castlenine/svelte-canvas-confetti` you are using.
      placeholder: '5.0.2'
    validations:
      required: true

  - type: input
    id: svelte-version
    attributes:
      label: Svelte Version
      description: 'Run `npx svelte -v` or check your `package.json`.'
      placeholder: '5.56.3'
    validations:
      required: true

  - type: input
    id: sveltekit-version
    attributes:
      label: SvelteKit Version
      description: 'If applicable. Run `npx svelte-kit -v` or check your `package.json`.'
      placeholder: '2.64.0'
    validations:
      required: false

  - type: input
    id: node-version
    attributes:
      label: Node.js Version
      description: 'Run `node -v` in your terminal.'
      placeholder: '22.22.3'
    validations:
      required: true

  - type: input
    id: package-manager
    attributes:
      label: Package Manager and Version
      description: 'Run `npm -v`, `pnpm -v`, or `yarn -v`.'
      placeholder: 'pnpm 11.5.3'
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - macOS
        - Windows
        - Linux
        - Other
    validations:
      required: true

  - type: dropdown
    id: browser
    attributes:
      label: Browser
      options:
        - Chrome
        - Firefox
        - Safari
        - Edge
        - Other
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other context about the problem (e.g., related issues, error logs, console output).
    validations:
      required: false
